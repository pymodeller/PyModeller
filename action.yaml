name: "Pymodeller Drift"
description: "Check drift between YAML spec and generated code"

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        enable-cache: true
        python-version: "3.13"

    - name: Install pymodeller
      run: uv tool install pymodeller --python 3.13
      shell: bash

    - name: Run drift check
      run: pymodeller drift
      shell: bash
