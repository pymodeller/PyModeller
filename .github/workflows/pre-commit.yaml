name: Pre-commit

on:
  workflow_call:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set PR token env
        env:
          PR_TOKEN_USER: ${{ secrets.PR_TOKEN_USER }}
        run: echo "PR_TOKEN_USER=${PR_TOKEN_USER}" >> $GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync

      - name: Run pre-commit
        run: uv run pre-commit run --all-files
