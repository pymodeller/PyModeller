name: Publish Package

on:
  workflow_call:

jobs:
  publish:
    runs-on: ubuntu-latest
    # Permisos necesarios para Trusted Publishers (OIDC) en PyPI
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Importante para que semantic-release o uv vean los tags

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        # Este paso usa OIDC, no necesita password si configuras PyPI
        uses: pypa/gh-action-pypi-publish@release/v1.14.0